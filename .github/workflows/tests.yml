name: tests

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Engine tests (the real logic)
        run: python3 test_engine.py
      - name: Server tests (the security attack pass)
        run: python3 test_server.py
