# Publishes the static site (the film + the pitch page) to GitHub Pages on every
# push to main, giving a public URL anyone can open — no server, no install.
# The interactive rescue needs the Python API, so for the *live* demo use the
# local run or the Render deploy; the film runs fully static here.
name: pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/configure-pages@v5
      - uses: actions/upload-pages-artifact@v3
        with:
          path: web            # serve the web/ folder as the site root
      - id: deployment
        uses: actions/deploy-pages@v4
